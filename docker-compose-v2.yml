services:

  # ── TRANSCONTROL V2 (PostgreSQL + FastAPI + Nginx en puerto 3002/8002) ─────────────────
  transcontrol-v2:
    build:
      context: .
      dockerfile: Dockerfile.v2
    container_name: transcontrol_app_v2
    restart: always
    ports:
      - "3002:80"    # Frontend V2 → http://localhost:3002
      - "8002:8000"  # Backend V2  → http://localhost:8002/docs
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - uploads_data_v2:/app/backend/uploads

volumes:
  postgres_data_v2:
    driver: local
  uploads_data_v2:
    driver: local
