[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

; ── PostgreSQL ──────────────────────────────────────────────────────────────
[program:postgres]
command=/usr/lib/postgresql/17/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/postgres.log
stderr_logfile=/var/log/postgres.log

; ── Backend (FastAPI) ───────────────────────────────────────────────────────
[program:backend]
command=bash -c "sleep 5 && uvicorn main:app --host 0.0.0.0 --port 8000"
directory=/app/backend
user=root
autostart=true
autorestart=true
priority=20
startsecs=10
startretries=5
stdout_logfile=/var/log/backend.log
stderr_logfile=/var/log/backend.log

; ── Nginx (Frontend) ────────────────────────────────────────────────────────
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/nginx_out.log
stderr_logfile=/var/log/nginx_err.log
