[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

; ── PostgreSQL ──────────────────────────────────────────────────────────────
[program:postgres]
command=/usr/lib/postgresql/17/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/postgres.log
stderr_logfile=/var/log/postgres.log

; ── Backend (FastAPI) ───────────────────────────────────────────────────────
; Espera 8s para que PostgreSQL esté completamente listo antes de arrancar
[program:backend]
command=bash -c "sleep 8 && uvicorn main:app --host 0.0.0.0 --port 8000"
directory=/app/backend
user=root
environment=DATABASE_URL="postgresql+psycopg://transuser:nueva_password@127.0.0.1:5432/transcontrol",SECRET_KEY="CAMBIA_ESTA_CLAVE_EN_PRODUCCION_debe_tener_64_chars_minimo",ALGORITHM="HS256",ACCESS_TOKEN_EXPIRE_MINUTES="60",APP_NAME="TransControl",DEBUG="false",UPLOAD_DIR="uploads",MAX_FILE_SIZE_MB="10"
autostart=true
autorestart=true
priority=20
startsecs=12
startretries=5
stdout_logfile=/var/log/backend.log
stderr_logfile=/var/log/backend.log

; ── Nginx (Frontend) ────────────────────────────────────────────────────────
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/nginx_out.log
stderr_logfile=/var/log/nginx_err.log
